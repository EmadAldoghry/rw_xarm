# Clock - This is correct
- ros_topic_name: "clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: "GZ_TO_ROS"

# Joint States - This is the most important change.
# <<< CRITICAL CHANGE HERE
# The Gazebo topic name must be the full path.
# Verify this with `gz topic -l | grep joint_state` if it doesn't work.
- ros_topic_name: "joint_states"
  gz_topic_name: "/world/pipeline_generated/model/rwbot_with_xarm/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: "GZ_TO_ROS"

